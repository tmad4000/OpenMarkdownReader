<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="64" y1="64" x2="960" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Background Squircle - Slate/graphite (premium / serious / professional) -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bg-grad)" stroke="#64748B" stroke-width="8"/>

  <!-- Content Group -->
  <g transform="translate(192, 230)">
    <!-- Header # -->
    <path d="M100 120 H200 M100 160 H200 M130 90 V190 M170 90 V190" stroke="#475569" stroke-width="16" stroke-linecap="round"/>

    <!-- Title Line -->
    <rect x="240" y="125" width="300" height="30" rx="15" fill="#1E293B"/>

    <!-- Text Lines -->
    <rect x="100" y="240" width="440" height="20" rx="10" fill="#94A3B8"/>
    <rect x="100" y="290" width="380" height="20" rx="10" fill="#94A3B8"/>
    <rect x="100" y="340" width="420" height="20" rx="10" fill="#94A3B8"/>

    <!-- Stylized M logo at bottom -->
    <path d="M420 520 L420 420 L470 520 L520 420 L520 520" stroke="#475569" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Corner fold -->
    <path d="M500 0 L640 0 L640 140 L500 0" fill="#E2E8F0"/>
  </g>

  <!-- Padlock badge in top-right corner -->
  <g transform="translate(800, 100)">
    <!-- Shield background -->
    <circle cx="60" cy="60" r="72" fill="#0F172A" stroke="#64748B" stroke-width="4"/>
    <!-- Lock body -->
    <rect x="30" y="62" width="60" height="50" rx="6" fill="#E2E8F0"/>
    <!-- Lock shackle -->
    <path d="M40 62 V42 C40 28 48 20 60 20 C72 20 80 28 80 42 V62" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="60" cy="82" r="5" fill="#0F172A"/>
    <rect x="58" y="82" width="4" height="12" fill="#0F172A"/>
  </g>
</svg>
